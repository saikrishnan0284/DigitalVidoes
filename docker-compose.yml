version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: celebrationhub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: celebrationhub
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - celebrationhub-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: celebrationhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - celebrationhub-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: celebrationhub-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - celebrationhub-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: celebrationhub-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/celebrationhub?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      - mongodb
      - redis
      - minio
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - celebrationhub-network

  # Web Frontend
  web:
    build:
      context: ./web
      dockerfile: ../docker/web.Dockerfile
    container_name: celebrationhub-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - celebrationhub-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: celebrationhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - web
    networks:
      - celebrationhub-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  celebrationhub-network:
    driver: bridge
